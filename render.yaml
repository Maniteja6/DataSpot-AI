services:
  - type: web
    name: dataspot-ai-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: https://dataspot.vercel.app
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: BEDROCK_MODEL_ID
        value: us.anthropic.claude-sonnet-4-5-20250929-v1:0
      - key: BEDROCK_DIRECT_INVOKE
        value: "true"
      - key: VECTOR_STORE_PROVIDER
        value: local_faiss
      - key: EMBEDDING_MODEL_ID
        value: amazon.titan-embed-text-v2:0
